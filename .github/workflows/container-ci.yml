name: Container CI

on:
  pull_request:
    paths:
      - "pubtator_link/**"
      - "server.py"
      - "mcp_server.py"
      - "docker/**"
      - "scripts/**"
      - "pyproject.toml"
      - "uv.lock"
      - "container-release.json"
      - ".dockerignore"
      - ".env.docker.example"
      - "CHANGELOG.md"
      - ".github/workflows/container-ci.yml"
      - ".github/workflows/container-release.yml"
  push:
    branches:
      - main
    paths:
      - "pubtator_link/**"
      - "server.py"
      - "mcp_server.py"
      - "docker/**"
      - "scripts/**"
      - "pyproject.toml"
      - "uv.lock"
      - "container-release.json"
      - ".dockerignore"
      - ".env.docker.example"
      - "CHANGELOG.md"
      - ".github/workflows/container-ci.yml"
      - ".github/workflows/container-release.yml"

permissions: {}

jobs:
  container-ci:
    permissions:
      contents: read
    uses: berntpopp/genefoundry-router/.github/workflows/_container-ci.yml@25ac0f7ace0afc235e630694d25d0ba4236712e4 # genefoundry-router container-release standard v1
