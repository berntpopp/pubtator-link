name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  PUBTATOR_LINK_MCP_SERVICE_TOKEN: ci-compose-validation-only

jobs:
  release-validation:
    name: Release validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true
          version: "0.8.7"

      - name: Install dependencies
        run: uv sync --group dev --frozen

      - name: Run local CI checks
        run: make ci-local

      - name: Validate production Compose config
        run: make docker-prod-config

      - name: Validate NPM Compose config
        run: make docker-npm-config

      - name: Build release Docker image
        run: docker build -f docker/Dockerfile -t pubtator-link:release .
