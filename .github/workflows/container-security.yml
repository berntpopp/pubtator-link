name: Container Security

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "43 4 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  container-security:
    name: Container scan and SBOM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t pubtator-link:scan .

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: pubtator-link:scan
          format: table
          output: trivy-report.txt
          exit-code: "0"

      - name: Generate SBOM
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: pubtator-link:scan
          format: cyclonedx
          output: pubtator-link-sbom.cdx.json
          exit-code: "0"

      - name: Upload scan artifacts
        uses: actions/upload-artifact@v6
        with:
          name: container-security-artifacts
          path: |
            trivy-report.txt
            pubtator-link-sbom.cdx.json
