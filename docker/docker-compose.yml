services:
  pubtator-link:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production

    container_name: pubtator_link_server

    # Environment configuration
    env_file:
      - path: ../.env
        required: false

    environment:
      # Development overrides
      PUBTATOR_LINK_LOG_LEVEL: DEBUG
      PUBTATOR_LINK_HOST: 0.0.0.0
      PUBTATOR_LINK_PORT: 8000
      PUBTATOR_LINK_TRANSPORT: unified

    # Port mapping
    ports:
      - "${PUBTATOR_LINK_PORT:-8000}:8000"

    # Use uvicorn for development (similar to litvar-link approach)
    command: ["uvicorn", "pubtator_link.server_manager:app", "--host", "0.0.0.0", "--port", "8000", "--proxy-headers"]

    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # Resource limits for development
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

    # Restart policy
    restart: unless-stopped

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
