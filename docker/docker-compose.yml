services:
  pubtator-postgres:
    image: pgvector/pgvector:0.8.2-pg18-trixie
    container_name: pubtator_link_postgres

    environment:
      POSTGRES_DB: "${PUBTATOR_LINK_POSTGRES_DB:-pubtator_link}"
      POSTGRES_USER: "${PUBTATOR_LINK_POSTGRES_USER:-pubtator_link}"
      POSTGRES_PASSWORD: "${PUBTATOR_LINK_POSTGRES_PASSWORD:-pubtator_link}"

    ports:
      - "${PUBTATOR_LINK_POSTGRES_PORT:-5434}:5432"

    volumes:
      - pubtator_postgres_data:/var/lib/postgresql
      - ../pubtator_link/db/review_schema.sql:/docker-entrypoint-initdb.d/010-review-schema.sql:ro

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    restart: unless-stopped

  pubtator-link:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production

    container_name: pubtator_link_server

    # Environment configuration
    env_file:
      - path: ../.env
        required: false

    environment:
      # Development overrides
      PUBTATOR_LINK_LOG_LEVEL: DEBUG
      PUBTATOR_LINK_HOST: 0.0.0.0
      PUBTATOR_LINK_PORT: 8000
      PUBTATOR_LINK_TRANSPORT: unified
      PUBTATOR_LINK_MCP_PROFILE: full
      PUBTATOR_LINK_DATABASE_URL: "postgresql://${PUBTATOR_LINK_POSTGRES_USER:-pubtator_link}:${PUBTATOR_LINK_POSTGRES_PASSWORD:-pubtator_link}@pubtator-postgres:5432/${PUBTATOR_LINK_POSTGRES_DB:-pubtator_link}"
      PUBTATOR_LINK_AUTO_MIGRATE: "true"
      PUBTATOR_LINK_REQUIRE_SCHEMA_CURRENT: "true"

    depends_on:
      pubtator-postgres:
        condition: service_healthy

    # Port mapping
    ports:
      - "${PUBTATOR_LINK_PORT:-8000}:8000"

    # Use uvicorn for development (similar to litvar-link approach)
    command: ["uvicorn", "pubtator_link.server_manager:create_app", "--factory", "--host", "0.0.0.0", "--port", "8000", "--proxy-headers"]

    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # Resource limits for development
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

    # Restart policy
    restart: unless-stopped

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pubtator_postgres_data:
