# Explicit project name isolates this stack. Without it, Compose defaults the project to the
# parent-dir basename ("docker"), shared by every -link repo that roots its compose at
# docker/docker-compose.yml — pooling unrelated containers/volumes into one "docker" project
# and triggering spurious orphan-container warnings (and making --remove-orphans able to delete
# a sibling stack). See https://docs.docker.com/reference/compose-file/version-and-name/
# NOTE: this changes Compose's named-volume prefix; a host with an existing
# docker_pubtator_postgres_data volume must migrate data on next redeploy (do not recreate blindly).
name: pubtator-link

services:
  pubtator-postgres:
    # F-15: digest-pinned (multi-arch index digest) so the deployed bytes are
    # reproducible and tamper-evident; the tag is retained for readability.
    # To upgrade: `docker buildx imagetools inspect pgvector/pgvector:<tag>` and
    # replace both the tag and the @sha256 index digest.
    image: pgvector/pgvector:0.8.5-pg18-trixie@sha256:9d2e61c7352b9e9f4798df5fd9a498f043f4cda1cdacc707de3d198650f4321e
    container_name: pubtator_link_postgres

    # The image's own non-root postgres uid:gid. Declared here (not only in the
    # prod overlay) because the central CI smoke stack is rendered from THIS file
    # plus a generated override that does not set `user`. The upstream entrypoint
    # starts as root and `gosu`-drops to `postgres`, which needs CAP_SETUID /
    # CAP_SETGID / CAP_CHOWN — impossible under the standard's mandatory
    # `cap_drop: [ALL]`. Starting as uid 999 skips that root branch entirely.
    user: "999:999"

    environment:
      POSTGRES_DB: "${PUBTATOR_LINK_POSTGRES_DB:-pubtator_link}"
      POSTGRES_USER: "${PUBTATOR_LINK_POSTGRES_USER:-pubtator_link}"
      POSTGRES_PASSWORD: "${PUBTATOR_LINK_POSTGRES_PASSWORD:-pubtator_link}"

    # Dev/local only — loopback-bound; never publish Postgres on a server.
    ports:
      - "127.0.0.1:${PUBTATOR_LINK_POSTGRES_PORT:-5434}:5432"

    volumes:
      - pubtator_postgres_data:/var/lib/postgresql
      # The container-release standard runs every container (including this
      # sidecar) with a read-only rootfs, so PostgreSQL's Unix-socket directory
      # must be explicit writable storage. A named volume — not a tmpfs — because
      # the central smoke stack replaces `tmpfs:` wholesale with its own /tmp cap.
      - pubtator_postgres_run:/var/run/postgresql
      - ../pubtator_link/db/review_schema.sql:/docker-entrypoint-initdb.d/010-review-schema.sql:ro

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    restart: unless-stopped

  pubtator-link:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production

    container_name: pubtator_link_server

    # Environment configuration
    env_file:
      - path: ../.env
        required: false

    environment:
      # Development overrides
      PUBTATOR_LINK_LOG_LEVEL: DEBUG
      PUBTATOR_LINK_HOST: 0.0.0.0
      PUBTATOR_LINK_PORT: 8000
      PUBTATOR_LINK_TRANSPORT: unified
      PUBTATOR_LINK_MCP_PROFILE: "${PUBTATOR_LINK_MCP_PROFILE:-readonly}"
      # PUBTATOR_LINK_MCP_SERVICE_TOKEN is deliberately NOT interpolated here.
      # Setting it installs MCPServiceAuthMiddleware, which bearer-gates the whole
      # /mcp path. The production overlay also leaves it unset (public read-only
      # /mcp); the base (readonly) stack must stay open so that (a) a bare `docker compose up`
      # works and (b) the central container-CI smoke gate — which derives its env
      # from every REQUIRED variable across base+prod and probes /mcp with no
      # Authorization header — is not 401'd by an injected placeholder token.
      # Local development can still supply one through ../.env (env_file above).
      PUBTATOR_LINK_ALLOWED_HOSTS: '["localhost","127.0.0.1","::1"]'
      PUBTATOR_LINK_ALLOWED_ORIGINS: '[]'
      PUBTATOR_LINK_ALLOW_UNAUTHENTICATED_WRITES: "false"
      PUBTATOR_LINK_DATABASE_URL: "postgresql://${PUBTATOR_LINK_POSTGRES_USER:-pubtator_link}:${PUBTATOR_LINK_POSTGRES_PASSWORD:-pubtator_link}@pubtator-postgres:5432/${PUBTATOR_LINK_POSTGRES_DB:-pubtator_link}"
      PUBTATOR_LINK_AUTO_MIGRATE: "true"
      PUBTATOR_LINK_REQUIRE_SCHEMA_CURRENT: "true"

    depends_on:
      pubtator-postgres:
        condition: service_healthy

    # Port mapping — dev/local only, loopback-bound (127.0.0.1) so copying this
    # file to a server never publishes the unauthenticated backend on the public
    # IP. Production uses the prod/npm overlays (ports: !reset []).
    ports:
      - "127.0.0.1:${PUBTATOR_LINK_PORT:-8000}:8000"

    # No `command:` override — the image's own default CMD is the hardened
    # multi-worker Gunicorn entrypoint that serves unified REST + MCP Streamable
    # HTTP. The container-release standard forbids a Compose command override on
    # the application service in the production render, so keeping the base file
    # free of one means the CI smoke stack exercises exactly the process that
    # production runs. `docker-compose.dev.yml` overrides it with the typer CLI
    # (`pubtator-link serve --reload`) for local development.

    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "-H", "Host: localhost", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # Resource limits for development
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

    # Restart policy
    restart: unless-stopped

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pubtator_postgres_data:
  pubtator_postgres_run:
