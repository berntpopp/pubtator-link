# Development docker-compose with hot-reloading
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up --build

services:
  pubtator-link:
    # Build a development image with volume mounts
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: builder

    # Override environment for development
    environment:
      PUBTATOR_LINK_LOG_LEVEL: DEBUG
      PYTHONPATH: /home/app/web

    # Volume mounts for hot-reloading
    volumes:
      - ../pubtator_link:/home/app/web/pubtator_link:delegated
      - ../pyproject.toml:/home/app/web/pyproject.toml:ro
      - ../README.md:/home/app/web/README.md:ro

    # Development command with auto-reload via the typer CLI.
    command: >
      sh -c "
        cd /home/app/web &&
        pip install -e . &&
        pubtator-link serve --transport unified --host 0.0.0.0 --port 8000 --dev
      "

    # Override user to root for development (to avoid permission issues)
    user: root

    # Working directory
    working_dir: /home/app/web
