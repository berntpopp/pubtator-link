# Production overlay for pubtator-link (Container & Deployment Hardening Standard v1
# + the GeneFoundry container-release standard).
#
#   PUBTATOR_LINK_IMAGE=ghcr.io/berntpopp/pubtator-link@sha256:<digest> \
#   docker compose -f docker/docker-compose.yml -f docker/docker-compose.prod.yml up -d
#
# The effective render of (base + this file) is validated by the router's central
# `validate-compose` gate. Every rule it enforces applies to BOTH the application
# and the declared `pubtator-postgres` sidecar (see container-release.json ->
# service.auxiliary): digest-pinned untagged image, pull_policy: missing, read_only
# rootfs, cap_drop: [ALL], no-new-privileges, bounded deploy limits + json-file
# logging, named-volume writable storage, approved networks, and no published ports.

services:
  pubtator-postgres:
    # Untagged repository digest: the central policy requires a fully qualified
    # `<registry>/<repo>@sha256:<digest>` reference with no mutable tag component.
    # The readable `pgvector/pgvector:0.8.5-pg18-trixie` tag stays in the base file;
    # this is the same multi-arch index digest.
    image: docker.io/pgvector/pgvector@sha256:9d2e61c7352b9e9f4798df5fd9a498f043f4cda1cdacc707de3d198650f4321e
    pull_policy: missing
    container_name: !reset null

    # Run as the image's own non-root postgres uid:gid. The upstream entrypoint
    # starts as root and `gosu`-drops to `postgres`, which needs CAP_SETUID /
    # CAP_SETGID / CAP_CHOWN — impossible under the standard's mandatory
    # `cap_drop: [ALL]`. Starting as uid 999 makes the entrypoint skip its root
    # branch entirely. Must stay identical to `service.auxiliary[].user` in
    # container-release.json; the central policy compares them exactly.
    user: "999:999"

    # Do not publish PostgreSQL to the host in production overlays.
    # Application containers reach it over the Compose network.
    ports: !reset []

    # F-14: production REQUIRES an explicit DB password with NO predictable
    # fallback. `${VAR:?msg}` makes `docker compose config`/`up` fail closed when
    # PUBTATOR_LINK_POSTGRES_PASSWORD is unset, so the base compose developer
    # default ("pubtator_link") can never reach a deployed database.
    #
    # ROTATION: set a fresh secret (e.g. `openssl rand -hex 32`) as
    # PUBTATOR_LINK_POSTGRES_PASSWORD in the deployment secret store. Postgres
    # only consumes POSTGRES_PASSWORD at initdb on an empty data volume, so
    # rotating an existing deployment means: update the value, run
    # `ALTER ROLE ... WITH PASSWORD` inside the running database (or recreate the
    # pubtator_postgres_data volume from a backup), then recreate the app
    # container so its DSN picks up the new secret.
    environment:
      POSTGRES_PASSWORD: "${PUBTATOR_LINK_POSTGRES_PASSWORD:?PUBTATOR_LINK_POSTGRES_PASSWORD is required in production (no fallback)}"

    # Only Compose-managed named volumes. The base file's read-only bind of
    # review_schema.sql into /docker-entrypoint-initdb.d is a local-dev bootstrap
    # convenience; production owns its schema through the application's
    # PUBTATOR_LINK_AUTO_MIGRATE path (pubtator_link/db/migrations), and host binds
    # are forbidden for a database-role sidecar.
    volumes: !override
      - pubtator_postgres_data:/var/lib/postgresql
      - pubtator_postgres_run:/var/run/postgresql

    read_only: true
    tmpfs: !override
      - /tmp:rw,noexec,nosuid,size=64m,mode=1777

    security_opt: !override
      - no-new-privileges:true
    cap_drop: !override
      - ALL
    init: true
    restart: on-failure

    deploy: !override
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
          pids: 256

    healthcheck: !override
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

    networks: !override
      - default

  pubtator-link:
    build: !reset null
    image: "${PUBTATOR_LINK_IMAGE:?PUBTATOR_LINK_IMAGE must be set to ghcr.io/berntpopp/pubtator-link@sha256:<digest>}"
    pull_policy: missing
    container_name: !reset null
    env_file: !reset []

    # The image's own default command IS the hardened multi-worker Gunicorn
    # entrypoint. The central policy forbids a Compose `command:`/`entrypoint:`
    # override on the application service, so the released image must already run
    # the production process.
    command: !reset null

    # Production-specific environment variables
    environment:
      # Host header used by the container healthcheck below; the app's
      # TrustedHost middleware only accepts PUBTATOR_LINK_ALLOWED_HOSTS.
      GF_HEALTHCHECK_HOST: localhost
      PUBTATOR_LINK_LOG_LEVEL: INFO
      PUBTATOR_LINK_LOG_FORMAT: json
      PUBTATOR_LINK_TRANSPORT: unified
      PUBTATOR_LINK_MCP_PROFILE: readonly
      PUBTATOR_LINK_ALLOW_UNAUTHENTICATED_WRITES: "false"
      # PUBTATOR_LINK_MCP_SERVICE_TOKEN is intentionally NOT set in production.
      # This endpoint serves read-only public PubTator3 literature data
      # (PUBTATOR_LINK_MCP_PROFILE: readonly, unauthenticated writes disabled
      # above), so /mcp is left open for direct public access — matching the base
      # stack. Setting this variable installs MCPServiceAuthMiddleware, which
      # bearer-gates the whole /mcp path and 401s every unauthenticated client.
      # To re-enable auth, restore the line below and supply the token via the
      # server's .env.docker secret store:
      #   PUBTATOR_LINK_MCP_SERVICE_TOKEN: "${PUBTATOR_LINK_MCP_SERVICE_TOKEN:?required}"
      # F-14: mirror the no-fallback DB secret requirement in the app DSN so a
      # missing PUBTATOR_LINK_POSTGRES_PASSWORD also fails the app service closed
      # (the base overlay's `:-pubtator_link` default is not inherited here).
      PUBTATOR_LINK_DATABASE_URL: "postgresql://${PUBTATOR_LINK_POSTGRES_USER:-pubtator_link}:${PUBTATOR_LINK_POSTGRES_PASSWORD:?PUBTATOR_LINK_POSTGRES_PASSWORD is required in production (no fallback)}@pubtator-postgres:5432/${PUBTATOR_LINK_POSTGRES_DB:-pubtator_link}"
      PUBTATOR_LINK_ENABLE_INBOUND_RATE_LIMIT: "true"
      PUBTATOR_LINK_TRUST_PROXY_HEADERS: "true"
      GUNICORN_WORKERS: 4
      GUNICORN_LOG_LEVEL: warning

    # Remove development volume mounts
    volumes: !reset []

    # ports: []
    ports: !reset []
    expose:
      - "8000"

    read_only: true
    tmpfs: !override
      - /tmp:rw,noexec,nosuid,size=64m,mode=1777

    security_opt: !override
      - no-new-privileges:true
    cap_drop: !override
      - ALL
    init: true
    restart: on-failure

    # Resource limits live only under `deploy`; the central policy rejects the
    # service-level `pids_limit`/`mem_limit`/`cpus` overrides.
    pids_limit: !reset null

    deploy: !override
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
          pids: 256

    # Enhanced health check for production
    healthcheck: !override
      test: ["CMD", "sh", "-c", "curl -f -H \"Host: $${GF_HEALTHCHECK_HOST}\" http://localhost:8000/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s

    # Production logging with rotation
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service=pubtator-link,environment=production"

    networks: !override
      - default

volumes: !override
  pubtator_postgres_data:
    name: pubtator-link_pubtator_postgres_data
  pubtator_postgres_run:
    name: pubtator-link_pubtator_postgres_run

networks: !override
  default:
    name: pubtator-link_default
