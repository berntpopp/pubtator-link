# Production docker-compose override
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  pubtator-postgres:
    # Do not publish PostgreSQL to the host in production overlays.
    # Application containers reach it over the Compose network.
    ports: !reset []

    # F-14: production REQUIRES an explicit DB password with NO predictable
    # fallback. `${VAR:?msg}` makes `docker compose config`/`up` fail closed when
    # PUBTATOR_LINK_POSTGRES_PASSWORD is unset, so the base compose developer
    # default ("pubtator_link") can never reach a deployed database.
    #
    # ROTATION: set a fresh secret (e.g. `openssl rand -hex 32`) as
    # PUBTATOR_LINK_POSTGRES_PASSWORD in the deployment secret store. Postgres
    # only consumes POSTGRES_PASSWORD at initdb on an empty data volume, so
    # rotating an existing deployment means: update the value, run
    # `ALTER ROLE ... WITH PASSWORD` inside the running database (or recreate the
    # pubtator_postgres_data volume from a backup), then recreate the app
    # container so its DSN picks up the new secret.
    environment:
      POSTGRES_PASSWORD: "${PUBTATOR_LINK_POSTGRES_PASSWORD:?PUBTATOR_LINK_POSTGRES_PASSWORD is required in production (no fallback)}"

  pubtator-link:
    # Production-specific environment variables
    environment:
      PUBTATOR_LINK_LOG_LEVEL: INFO
      PUBTATOR_LINK_LOG_FORMAT: json
      PUBTATOR_LINK_TRANSPORT: unified
      PUBTATOR_LINK_MCP_PROFILE: readonly
      PUBTATOR_LINK_ALLOW_UNAUTHENTICATED_WRITES: "false"
      PUBTATOR_LINK_MCP_SERVICE_TOKEN: "${PUBTATOR_LINK_MCP_SERVICE_TOKEN:?required}"
      # F-14: mirror the no-fallback DB secret requirement in the app DSN so a
      # missing PUBTATOR_LINK_POSTGRES_PASSWORD also fails the app service closed
      # (the base overlay's `:-pubtator_link` default is not inherited here).
      PUBTATOR_LINK_DATABASE_URL: "postgresql://${PUBTATOR_LINK_POSTGRES_USER:-pubtator_link}:${PUBTATOR_LINK_POSTGRES_PASSWORD:?PUBTATOR_LINK_POSTGRES_PASSWORD is required in production (no fallback)}@pubtator-postgres:5432/${PUBTATOR_LINK_POSTGRES_DB:-pubtator_link}"
      PUBTATOR_LINK_ENABLE_INBOUND_RATE_LIMIT: "true"
      PUBTATOR_LINK_TRUST_PROXY_HEADERS: "true"
      GUNICORN_WORKERS: 4
      GUNICORN_LOG_LEVEL: warning

    # Remove development volume mounts
    volumes: []

    # ports: []
    ports: !reset []

    read_only: true
    tmpfs:
      - /tmp/pubtator-link:rw,noexec,nosuid,size=64m,mode=1777

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    pids_limit: 256
    init: true

    # Use the default production command (Gunicorn)
    command: ["gunicorn", "-c", "gunicorn_conf.py", "pubtator_link.server_manager:create_app()"]

    # Production resource limits
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
          pids: 256
        reservations:
          memory: 512M
          cpus: '0.5'

      # Production restart policy
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s

    # Enhanced health check for production
    healthcheck:
      test: ["CMD", "curl", "-f", "-H", "Host: localhost", "http://localhost:8000/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s

    # Production logging with rotation
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service=pubtator-link,environment=production"
